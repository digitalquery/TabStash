<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Tab Stash</title>
  <link rel="stylesheet" href="sidebar.css">
</head>
<body>
  <div class="header">
    <input type="text" id="filter" placeholder="Filter by title or URL...">
    <button id="prefs-btn" class="prefs-btn" title="Preferences">&#9881;</button>
  </div>
  <div id="list" class="list"></div>
  <div class="footer">
    <button id="export-btn" class="primary">Export JSON</button>
    <button id="import-btn">Import JSON</button>
    <input type="file" id="import-file" accept=".json" style="display:none">
  </div>
  <script src="sidebar.js"></script>
</body>
</html>
